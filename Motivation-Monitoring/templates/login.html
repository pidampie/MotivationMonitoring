<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Motivation Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* RESET & GLOBAL STYLES */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        /* Gaya Ruangguru: Background gradasi biru premium yang menyegarkan mata */
        background: linear-gradient(
          135deg,
          #1e3a8a 0%,
          #3b82f6 50%,
          #60a5fa 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* CONTAINER CARD LOGIN */
      .login-card {
        background-color: #ffffff;
        width: 100%;
        max-width: 400px;
        padding: 40px 32px;
        border-radius: 16px; /* Sudut melengkung halus yang modern */
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.2),
          0 8px 10px -6px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      /* BRANDING LOGO & TYPOGRAPHY */
      .brand-icon-wrapper {
        width: 54px;
        height: 54px;
        background-color: #eff6ff;
        color: #1d4ed8;
        font-size: 24px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px auto;
      }

      .login-card h2 {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }

      .login-card .subtitle {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 32px;
      }

      /* FORM UTAMA INTERFACE */
      .form-group {
        position: relative;
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 16px;
        transition: color 0.2s;
      }

      /* STYLE KOTAK INPUT */
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px 12px 42px; /* Memberikan ruang di kiri untuk ikon batin */
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background-color: #f8fafc;
        color: #334155;
        font-size: 13.5px;
        outline: none;
        transition: all 0.2s ease;
      }

      /* Efek Fokus Khas Portal Pendidikan Premium */
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: #3b82f6;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      }

      input[type="text"]:focus + i,
      input[type="password"]:focus + i {
        color: #3b82f6; /* Ikon otomatis berubah biru saat kotak diklik */
      }

      /* BUTTON LOGIN UTAMA (FLAT PREMIUM) */
      .btn-login {
        width: 100%;
        padding: 12px 24px;
        background-color: #ffc107; /* Aksen Kuning Emas Ruangguru */
        color: #0f172a;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
        box-shadow: 0 4px 6px -1px rgba(255, 193, 7, 0.2);
        transition: all 0.2s;
      }

      .btn-login:hover {
        background-color: #e5b006;
        transform: translateY(-1px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      /* FOOTER SISTEM NOTA */
      .login-footer-caption {
        margin-top: 24px;
        font-size: 11.5px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand-icon-wrapper">
        <i class="fa-solid fa-graduation-cap"></i>
      </div>
      <h2>Motivation Monitoring</h2>
      <p class="subtitle">Sistem Pemantauan Psikologis Peserta Didik</p>

      <form action="/login" method="POST">
        <div class="form-group">
          <input
            type="text"
            name="username"
            placeholder="Username / NIP Pengajar"
            required
            autocomplete="off"
          />
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="form-group">
          <input
            type="password"
            name="password"
            placeholder="Kata Sandi Akun"
            required
          />
          <i class="fa-solid fa-lock"></i>
        </div>

        <button type="submit" class="btn-login">
          <span>Masuk ke Dashboard</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <p class="login-footer-caption">
        <i class="fa-solid fa-shield-halved"></i> Offline Localhost Mode Secured
      </p>
    </div>
  </body>
</html>
